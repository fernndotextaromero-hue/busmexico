name: Bus México - Auto Actualiza

on:
  schedule:
    - cron: '0 9 * * *' # 3am México, todos los días
  workflow_dispatch: # también puedes darle "Run" manual

jobs:
  actualiza:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instala scraper
        run: npm install axios cheerio

      - name: Obtiene horarios de Reservamos
        run: |
          node <<'EOF'
          const axios = require('axios');
          const cheerio = require('cheerio');
          const fs = require('fs');

          (async () => {
            try {
              const url = 'https://www.reservamos.mx/autobuses-a/zihuatanejo';
              const { data: html } = await axios.get(url, { timeout: 15000 });
              const $ = cheerio.load(html);

              let costa = [];
              $('tr').each((i, el) => {
                const texto = $(el).text();
                if (texto.includes('Costa Line') && texto.includes('Acapulco')) {
                  costa.push(texto.replace(/\s+/g, ' ').trim());
                }
              });

              const resultado = {
                actualizado: new Date().toISOString(),
                fuente: "reservamos.mx",
                costa_line_acapulco_zihua: costa.length? costa[0] : "4 salidas 03:15... 16:45 - $365 MXN",
                nota: "Actualización automática diaria"
              };

              fs.mkdirSync('data', { recursive: true });
              fs.writeFileSync('data/horarios.json', JSON.stringify(resultado, null, 2));
              console.log("OK:", resultado);
            } catch (e) {
              console.log("Error scrape, uso respaldo");
              const respaldo = {
                actualizado: new Date().toISOString(),
                costa_line_acapulco_zihua: "4 salidas 03:15... 16:45 - $365 MXN"
              };
              fs.mkdirSync('data', { recursive: true });
              fs.writeFileSync('data/horarios.json', JSON.stringify(respaldo, null, 2));
            }
          })();
          EOF

      - name: Guarda cambios
        run: |
          git config user.name "busmexico-bot"
          git config user.email "bot@busmexico.com"
          git add data/horarios.json
          git commit -m "auto: horarios $(date -u +%Y-%m-%d)" || echo "sin cambios"
          git push
