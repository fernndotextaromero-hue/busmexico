name: Actualiza horarios

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Marca actualización
        run: echo "Última actualización: $(date)" > data/actualizado.txt
      
      - name: Sube cambios
        run: |
          git config user.name "busmexico-bot"
          git config user.email "bot@busmexico.com"
          git add data/actualizado.txt
          git commit -m "auto update" || echo "sin cambios"
          git push
