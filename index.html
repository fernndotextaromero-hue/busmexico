
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BUSMEXICO</title>
<style>
body{background:#fff;color:#000;font-family:system-ui;padding:15px}
h1{color:#0077ff;text-align:center}
.card{background:#f1f5f9;padding:14px;border-radius:12px;margin:10px 0}
input,select,button{width:100%;padding:14px;border-radius:10px;border:1px solid #ccc;font-size:16px;margin:6px 0}
button{background:#0077ff;color:#fff;font-weight:bold;border:0}
</style>
</head>
<body>
<h1>🚌 BUSMEXICO</h1>
<div class="card">
<select id="p"></select>
<input id="o" placeholder="Escribe tu pueblo (MAYUS o minus)">
<button onclick="b()">Ver horarios</button>
<p id="s"></p>
</div>
<div id="r"></div>
<script>
const L=["Zihuatanejo","San Jeronimito","Petatlan","Papanoa","Lazaro Cardenas"];
const S=document.getElementById('p');L.forEach(x=>{let o=document.createElement('option');o.value=x;o.textContent=x;S.appendChild(o)});
const N=t=>t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
async function b(){const q=N(document.getElementById('o').value||S.value);document.getElementById('s').textContent='Buscando: '+q;const d=await (await fetch('data/horarios.json?'+Date.now())).json();const m=new Date().getHours()*60+new Date().getMinutes();const f=d.rutas.filter(t=>N(t.origen+' '+t.destino+' '+(t.paradas||'')).includes(q)).map(t=>{const[h,mi]=t.hora.split(':');return{...t,w:+h*60+ +mi-m}}).filter(t=>t.w>-60).sort((a,b)=>a.w-b.w);document.getElementById('r').innerHTML=f.map(t=>`<div class=card><b>${t.hora}</b> ${t.empresa||'Bus'}<br>${t.origen} → ${t.destino}<br><small>${t.w>0?'En '+t.w+' min':'Ahora'} • $${t.precio||'?'} MXN</small></div>`).join('')||'No hay corridas'}
</script>
</body>
</html>
