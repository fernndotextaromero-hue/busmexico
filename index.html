<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" href="logo.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="logo.jpg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horarios Bus - Lázaro a CDMX</title>
  <style>
    body{margin:0;font-family:system-ui,sans-serif;background:#0d1117;color:#c9d1d9;padding:20px;}
    h1{margin:0;font-size:24px;text-align:center;color:#f0883e;}
    .sub{text-align:center;font-size:14px;color:#8b949e;margin-bottom:20px;}
    input{width:100%;padding:14px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#fff;font-size:16px;box-sizing:border-box;}
    .btn{width:100%;margin-top:8px;padding:14px;background:#238636;border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;}
    #res{margin-top:16px;}
    .card{background:#161b22;border-radius:8px;padding:16px;border:1px solid #30363d;}
    .pueblo{font-weight:600;margin-bottom:12px;font-size:18px;color:#58a6ff;}
    .dir{font-weight:bold;margin-top:12px;color:#f0883e;border-bottom:1px solid #21262d;padding-bottom:4px;}
    .hora-item{display:flex;justify-content:between;padding:8px 0;border-bottom:1px solid #21262d;}
    .hora-item:last-child{border:none;}
  </style>
</head>
<body>

  <h1>Bus México</h1>
  <div class="sub">Busca horarios de paso por tu localidad</div>
  <input id="q" placeholder="Escribe: Zihuatanejo, Atoyac, Acapulco...">
  <button class="btn" onclick="render()">Buscar Horarios</button>
  <div id="res"></div>

<script>
// 1. RUTA COMPLETA DE COSTA A COSTA
const RUTA_COMPLETA = [
  { id: "lazaro cardenas", nombre: "Lázaro Cárdenas", minutos: 0 },
  { id: "guacamayas", nombre: "Guacamayas", minutos: 15 },
  { id: "la mira", nombre: "La Mira (Entronque)", minutos: 20 },
  { id: "buena vista", nombre: "Buenavista", minutos: 25 },
  { id: "rodesia", nombre: "Rodesia (Entronque)", minutos: 15 },
  { id: "lagunillas", nombre: "Lagunillas", minutos: 20 },
  { id: "pantla", nombre: "Pantla", minutos: 15 },
  { id: "barrio viejo", nombre: "Barrio Viejo", minutos: 10 },
  { id: "ixtapa", nombre: "Ixtapa (Cruce)", minutos: 15 },
  { id: "zihuatanejo", nombre: "Zihuatanejo (Terminal)", minutos: 20 },
  { id: "el coacuyul", nombre: "El Coacuyul", minutos: 15 },
  { id: "san jeronimito", nombre: "San Jeronimito", minutos: 15 },
  { id: "petatlan", nombre: "Petatlán", minutos: 15 },
  { id: "coyuquilla", nombre: "Coyuquilla", minutos: 30 },
  { id: "papanoa", nombre: "Papanoa", minutos: 20 },
  { id: "techan de galeana", nombre: "Tecpan de Galeana", minutos: 40 },
  { id: "tenexpa", nombre: "Tenexpa (Entronque)", minutos: 10 },
  { id: "suchil", nombre: "El Súchil", minutos: 10 },
  { id: "san jeronimo", nombre: "San Jerónimo", minutos: 15 },
  { id: "atoyac", nombre: "Atoyac de Álvarez", minutos: 20 },
  { id: "coyuca de benitez", nombre: "Coyuca de Benítez", minutos: 35 },
  { id: "pie de la cuesta", nombre: "Pie de la Cuesta", minutos: 25 },
  { id: "acapulco", nombre: "Acapulco (Cruces)", minutos: 30 },
  { id: "tres palos", nombre: "Tres Palos", minutos: 20 },
  { id: "san marcos", nombre: "San Marcos", minutos: 40 },
  { id: "tierra colorada", nombre: "Tierra Colorada", minutos: 50 },
  { id: "chilpancingo", nombre: "Chilpancingo", minutos: 60 },
  { id: "iguala", nombre: "Iguala (Central)", minutos: 80 },
  { id: "taxco", nombre: "Taxco de Alarcón", minutos: 40 },
  { id: "cuernavaca", nombre: "Cuernavaca", minutos: 90 },
  { id: "ciudad de mexico", nombre: "Ciudad de México", minutos: 90 }
];

// 2. HORARIOS DE SALIDA DESDE LAS TERMINALES
const salidasLzc = ["04:00", "06:30", "09:00", "12:00", "15:30", "18:00", "21:30"];
const salidasCdmx = ["00:30", "05:00", "08:30", "11:00", "14:00", "17:30", "20:00", "23:00"];

// 3. FUNCIÓN DE LIMPIEZA DE TEXTO
const norm = s => s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

// 4. CÁLCULO DE ADICIÓN DE TIEMPOS HORARIOS
function sumarMinutos(horaStr, minutosASumar) {
  const [h, m] = horaStr.split(':').map(Number);
  let d = new Date();
  d.setHours(h, m, 0, 0);
  d.setMinutes(d.getMinutes() + minutosASumar);
  return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: false });
}

// 5. RENDERIZADO DE RESULTADOS DE BÚSQUEDA
function render() {
  const query = norm(document.getElementById("q").value);
  const contenedor = document.getElementById("res");
  contenedor.innerHTML = "";

  if (!query) {
    contenedor.innerHTML = "<div class='card'>Escribe un lugar para buscar.</div>";
    return;
  }

  const indexPueblo = RUTA_COMPLETA.findIndex(p => 
    norm(p.id).includes(query) || norm(p.nombre).includes(query)
  );

  if (indexPueblo === -1) {
    contenedor.innerHTML = "<div class='card'>Lugar no encontrado. Intenta con otra población.</div>";
    return;
  }

  const puebloBuscado = RUTA_COMPLETA[indexPueblo];

  // CÁLCULO PARA LA IDA (Lzc -> CDMX)
  let minutosAcumuladosIda = 0;
  for (let i = 0; i < indexPueblo; i++) {
    minutosAcumuladosIda += RUTA_COMPLETA[i].minutos || 0;
  }

  // CÁLCULO PARA EL REGRESO (CDMX -> Lzc)
  let minutosAcumuladosRegreso = 0;
  for (let i = RUTA_COMPLETA.length - 1; i > indexPueblo; i--) {
    minutosAcumuladosRegreso += RUTA_COMPLETA[i].minutos || 0;
  }

  // CONSTRUCCIÓN DEL HTML DINÁMICO
  let html = `<div class='card'>
    <div class='pueblo'>📍 En tránsito por: <strong>${puebloBuscado.nombre}</strong></div>`;

  html += `<div class='dir'>➡️ Salidas hacia CDMX:</div>`;
  salidasLzc.forEach(salida => {
    let horaPaso = sumarMinutos(salida, minutosAcumuladosIda);
    html += `<div class='hora-item'><span>${horaPaso} hrs</span></div>`;
  });

  html += `<div class='dir'>⬅️ Regreso hacia Lázaro Cárdenas:</div>`;
  salidasCdmx.forEach(salida => {
    let horaPaso = sumarMinutos(salida, minutosAcumuladosRegreso);
    html += `<div class='hora-item'><span>${horaPaso} hrs</span></div>`;
  });

  html += `</div>`;
  contenedor.innerHTML = html;
}
</script>

<footer style="text-align: center; margin-top: 30px; padding: 10px; font-size: 0.8em; color: gray;">
  <p>&copy; 2026 busmexico por Fernando Texta-Romero. Todos los derechos reservados.</p>
</footer>

</body>
</html>
