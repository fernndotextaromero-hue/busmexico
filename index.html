<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BusMexico Guerrero</title><style>body{margin:0;font-family:system-ui;background:#0a192f;color:#fff;text-align:center}header{padding:20px;background:#112240}h1{color:#00d4ff;margin:0;font-size:28px}.card{background:#112240;margin:15px;padding:15px;border-radius:12px}select,button{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:none;font-size:16px}button{background:#00d4ff;color:#0a192f;font-weight:bold}</style></head><body><header><h1>🚍 BUSMEXICO</h1><p>Guerrero | by Fernando Texta</p></header><div class="card"><h3>Buscar Ruta Costa Grande</h3><select id="o"><option>Acapulco</option><option>Rodecia</option><option>Nuxco</option><option>Papanoa</option><option>San Luis San Pedro</option><option>Tecpan</option><option>Zihuatanejo</option></select><select id="d"><option>Zihuatanejo</option><option>Acapulco</option></select><button onclick="ver()">Ver Horarios</button><div id="r"></div></div><div class="card"><h3>📍 Mi Parada Más Cercana</h3><button onclick="gps()">Usar GPS</button><p id="g"></p></div><script>const h=["05:30 Estrella de Oro","07:00 Costa Line","09:15 Estrella Blanca","11:30 Local","14:00 Estrella de Oro","16:45 Costa Line","19:00 Última"];function ver(){document.getElementById('r').innerHTML=h.map(x=>`<p>🚌 ${x}</p>`).join('')+`<p style="color:#00d4ff;margin-top:10px">Desde ${o.value} a ${d.value}</p>`}function gps(){navigator.geolocation.getCurrentPosition(p=>{let lat=p.coords.latitude;let lugar=lat>17.2?"Nuxco / Papanoa":"Acapulco Centro";document.getElementById('g').innerText="Estás cerca de: "+lugar})}</script><p style="font-size:12px;opacity:.7">v2 - Funciona sin internet</p></body></html>
